<div class="homepage-container">
  <div class="header">
    <h1>A ta soif !</h1>
    <img
      class="header-logo"
      src="/logo/ChatGPT Image 9 juil. 2025, 20_41_54.png"
      alt="logo du site"
    />
  </div>
  <div class="card">
    <h2>Réinitialiser le mot de passe</h2>
    <form (ngSubmit)="onSubmit()">
      <label for="password">Nouveau mot de passe</label>
      <input
        type="password"
        id="password"
        name="password"
        [(ngModel)]="password"
        required
      />
      <label for="confirmPassword">Confirmer le mot de passe</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        required
      />
      <button type="submit">Valider</button>
    </form>
  </div>
  @if (showToast) {
    <div
      class="reset-toast"
      [ngClass]="{ success: toastSuccess, error: !toastSuccess }"
    >
      {{ toastMessage }}
    </div>
  }
  <footer class="footer">
    <span>© 2025 - A ta soif !</span>
  </footer>
</div>
