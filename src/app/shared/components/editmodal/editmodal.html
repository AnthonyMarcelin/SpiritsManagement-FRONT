<div class="editmodal-overlay">
  <div class="editmodal-card">
    <h3>{{ title || "Modifier" }}</h3>
    <form (ngSubmit)="onValidate()">
      <label [for]="fieldId">{{ label || "Nouvelle valeur" }}</label>
      @if (fieldName === "photo") {
        <input
          [id]="fieldId"
          type="file"
          (change)="onFileChange($event)"
          accept="image/*"
          required
        />
        @if (previewUrl) {
          <div class="editmodal-preview">
            <img [src]="previewUrl" alt="Prévisualisation" />
          </div>
        }
      } @else if (options && options.length > 0) {
        <select
          class="editmodal-select"
          [id]="fieldId"
          [(ngModel)]="value"
          name="editValue"
          required
        >
          <option
            *ngFor="let opt of options"
            [value]="opt.id || opt.value || opt"
          >
            {{ opt.name || opt.label || opt.value || opt }}
          </option>
        </select>
      } @else {
        <input
          [id]="fieldId"
          [type]="type || 'text'"
          [(ngModel)]="value"
          name="editValue"
          required
          autocomplete="off"
          [min]="fieldName === 'note' ? 0 : null"
          [max]="fieldName === 'note' ? 10 : null"
          step="fieldName === 'note' ? 0.1 : null"
        />
        @if (fieldName === "note" && (+value < 0 || +value > 10)) {
          <div class="error-message">
            La note doit être comprise entre 0 et 10.
          </div>
        }
      }
      <div class="editmodal-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">
          Annuler
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="fieldName === 'note' && (+value < 0 || +value > 10)"
        >
          Valider
        </button>
      </div>
    </form>
  </div>
</div>
