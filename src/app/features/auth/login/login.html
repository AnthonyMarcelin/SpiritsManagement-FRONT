<div class="login-container">
  <div class="header">
    <h1>A ta soif !</h1>
    <img
      class="header-logo"
      src="/logo/ChatGPT Image 9 juil. 2025, 20_41_54.png"
      alt="logo du site"
    />
  </div>
  <div class="login-card">
    <h2>Connexion</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        />
      </div>
      <button type="submit">Se connecter</button>
      @if (error) {
        <div class="error">{{ error }}</div>
      }
      <div class="login-toast" *ngIf="showToast">
        {{ toastMessage }}
      </div>
    </form>
    <div class="forgot-link">
      <a routerLink="/forgot-password" class="forgot-btn">
        <span class="icon-lock"
          ><svg width="18" height="18" fill="none" viewBox="0 0 24 24">
            <path
              fill="#6c63ff"
              d="M17 9V7a5 5 0 0 0-10 0v2a3 3 0 0 0-3 3v6a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-6a3 3 0 0 0-3-3Zm-8-2a3 3 0 0 1 6 0v2H9V7Zm10 11a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-6a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6Z"
            /></svg
        ></span>
        <span>Mot de passe oublié&nbsp;?</span>
      </a>
    </div>
    <div class="register-link">
      <span>Pas encore de compte ? </span
      ><a class="register-underline" routerLink="/register">S'inscrire</a>
    </div>
  </div>
  <footer class="footer">
    <span>© 2025 - A ta soif !</span>
  </footer>
</div>
