<div class="login-container">
  <div class="header">
    <h1>A ta soif !</h1>
    <img
      class="header-logo"
      src="/logo/ChatGPT Image 9 juil. 2025, 20_41_54.png"
      alt="logo du site"
    />
  </div>
  <div class="login-card">
    <h2>Connexion</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        />
      </div>
      <button type="submit">Se connecter</button>
      @if (error) {
        <div class="error">{{ error }}</div>
      }
    </form>
    <div class="forgot-link">
      <a routerLink="/forgot-password">Mot de passe oublié&nbsp;?</a>
    </div>
    <div class="register-link">
      <span>Pas encore de compte ? </span
      ><a class="register-underline" routerLink="/register">S'inscrire</a>
    </div>
  </div>
  <footer class="footer">
    <span>© 2025 - A ta soif !</span>
  </footer>
</div>
