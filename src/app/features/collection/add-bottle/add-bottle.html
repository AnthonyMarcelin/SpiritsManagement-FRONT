<h1>Ajouter une bouteille</h1>
<div *ngIf="showErrorToast" class="error-toast">
  {{ errorToastMessage }}
</div>
<form class="add-bottle-form">
  <div class="form-row">
    <label for="name">Nom <span class="required">*</span></label>
    <input
      id="name"
      name="name"
      type="text"
      [(ngModel)]="bottle.name"
      required
    />
  </div>
  <div class="form-row">
    <label for="description">Description</label>
    <textarea
      id="description"
      name="description"
      rows="3"
      [(ngModel)]="bottle.description"
    ></textarea>
  </div>
  <div class="form-row">
    <label for="review">Avis</label>
    <textarea
      id="review"
      name="review"
      rows="2"
      [(ngModel)]="bottle.review"
    ></textarea>
  </div>
  <div class="form-row">
    <label for="note">Note</label>
    <input
      id="note"
      name="note"
      type="number"
      step="0.1"
      min="0"
      max="10"
      [(ngModel)]="bottle.note"
      #noteInput="ngModel"
    />
    @if (noteInput.invalid && noteInput.touched) {
      <div class="error-message">La note doit être comprise entre 0 et 10.</div>
    }
  </div>
  <div class="form-row">
    <label for="price">Prix <span class="required">*</span> (€)</label>
    <input
      id="price"
      name="price"
      type="number"
      step="0.01"
      min="0"
      [(ngModel)]="bottle.price"
      required
    />
  </div>
  <div class="form-row">
    <label for="photo">Photo</label>
    <input
      id="photo"
      name="photo"
      type="file"
      accept="image/*"
      (change)="onPhotoSelected($event)"
      capture="environment"
    />
    <div *ngIf="photoPreviewUrl" class="photo-preview">
      <img
        [src]="photoPreviewUrl"
        alt="Aperçu photo"
        style="
          max-width: 100%;
          max-height: 200px;
          margin-top: 0.5rem;
          border-radius: 8px;
        "
      />
    </div>
  </div>
  <div class="form-row">
    <label for="labelId">Label <span class="required">*</span></label>
    <select id="labelId" name="labelId" [(ngModel)]="bottle.labelId" required>
      <option value="">Sélectionner</option>
      <option *ngFor="let label of labels" [value]="label.id">
        {{ label.name }}
      </option>
    </select>
  </div>
  <div class="form-row">
    <label for="originId">Origine</label>
    <input
      id="originId"
      name="originId"
      type="text"
      [(ngModel)]="bottle.originId"
      (input)="onOriginInput($event)"
      [attr.list]="'origin-list'"
      autocomplete="off"
      required
    />
    <datalist id="origin-list">
      <option
        *ngFor="let origin of originSuggestions"
        [value]="origin.country"
      ></option>
    </datalist>
  </div>
  <div class="form-row">
    <label for="supplierId">Fournisseur</label>
    <input
      id="supplierId"
      name="supplierId"
      type="text"
      [(ngModel)]="bottle.supplierId"
      (input)="onSupplierInput($event)"
      [attr.list]="'supplier-list'"
      autocomplete="off"
      required
    />
    <datalist id="supplier-list">
      <option
        *ngFor="let supplier of supplierSuggestions"
        [value]="supplier.name"
      ></option>
    </datalist>
  </div>
  <div class="form-row">
    <label for="typeId">Type <span class="required">*</span></label>
    <select id="typeId" name="typeId" [(ngModel)]="bottle.typeId" required>
      <option value="">Sélectionner</option>
      <option *ngFor="let type of filteredTypes" [value]="type.id">
        {{ type.name }}
      </option>
    </select>
  </div>
  <div class="form-row" *ngIf="alcoolType === 'whisky'">
    <label for="peatLevelId"
      >Niveau de tourbe <span class="required">*</span></label
    >
    <select
      id="peatLevelId"
      name="peatLevelId"
      [(ngModel)]="bottle.peatLevelId"
    >
      <option value="">Sélectionner</option>
      <option *ngFor="let peat of peatLevels" [value]="peat.id">
        {{ peat.name }}
      </option>
    </select>
  </div>
  <button type="submit" (click)="onAddBottle()">Ajouter</button>
  <button type="button" class="cancel-btn" (click)="onCancel()">Annuler</button>
</form>
