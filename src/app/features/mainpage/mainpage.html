<div class="mainpage-container">
  <header class="mainpage-header">
    <h1>À ta soif !</h1>
    <img
      class="mainpage-logo"
      src="/logo/ChatGPT Image 9 juil. 2025, 20_41_54.webp"
      alt="logo du site"
    />
  </header>

  <main class="mainpage-content">
    <h2>Bonjour {{ pseudo }} !</h2>
    <div class="alcohol-cards">
      <app-mainpage-card
        *ngFor="let alcohol of alcohols"
        [label]="alcohol.label"
        [number]="alcohol.count"
        [img]="alcohol.img"
        [route]="alcohol.route"
        [goTo]="goTo.bind(this)"
        [getText]="alcohol.getText"
      ></app-mainpage-card>
    </div>
  </main>

  <app-navbar></app-navbar>
</div>
