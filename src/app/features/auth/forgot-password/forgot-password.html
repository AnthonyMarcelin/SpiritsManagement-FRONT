<div class="homepage-container">
  <div class="header">
    <h1>A ta soif !</h1>
    <img
      class="header-logo"
      src="/logo/ChatGPT Image 9 juil. 2025, 20_41_54.png"
      alt="logo du site"
    />
  </div>
  <div class="card">
    <h2>Mot de passe oublié</h2>
    <form (ngSubmit)="onSubmit($event)">
      <label for="email">Adresse e-mail</label>
      <input
        type="email"
        id="email"
        name="email"
        [(ngModel)]="email"
        required
      />
      <button type="submit">Envoyer le lien de réinitialisation</button>
    </form>
    <div class="toast-container" *ngIf="showToast">
      <div
        class="toast"
        [ngClass]="{ success: toastSuccess, error: !toastSuccess }"
      >
        {{ toastMessage }}
      </div>
    </div>
  </div>
  <footer class="footer">
    <span>© 2025 - A ta soif !</span>
  </footer>
</div>
