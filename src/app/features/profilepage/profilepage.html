<div class="profile-container">
  <h2>Mon profil</h2>

  <form class="profile-form">
    <div class="form-group">
      <label for="pseudo">Pseudo</label>
      <div class="input-with-icon">
        <input
          id="pseudo"
          name="pseudo"
          type="text"
          [value]="user.pseudo"
          readonly
        />
        <button
          type="button"
          class="edit-icon"
          aria-label="Modifier le pseudo"
          (click)="openEditModal()"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M3 17.25V21h3.75l11.06-11.06a1 1 0 0 0 0-1.41l-2.24-2.24a1 1 0 0 0-1.41 0L3 17.25z"
              stroke="#888"
              stroke-width="2"
              fill="none"
            />
            <path
              d="M14.06 7.94l2.24 2.24"
              stroke="#888"
              stroke-width="2"
              fill="none"
            />
          </svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label for="firstname">Prénom</label>
      <input
        id="firstname"
        name="firstname"
        type="text"
        [value]="user.firstname"
        readonly
      />
    </div>
    <div class="form-group">
      <label for="lastname">Nom</label>
      <input
        id="lastname"
        name="lastname"
        type="text"
        [value]="user.lastname"
        readonly
      />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <div class="input-with-icon">
        <input
          id="email"
          name="email"
          type="email"
          [value]="user.email"
          readonly
        />
      </div>
    </div>
    <button
      type="button"
      class="btn btn-secondary change-password"
      (click)="openChangePasswordModal()"
    >
      Modifier mon mot de passe
    </button>
    <div class="profile-dates">
      <div>
        Date de création du compte :
        {{ user.created_at | date: "dd/MM/yyyy HH:mm" }}
      </div>
      <div>
        Dernière modification :
        {{ user.updated_at | date: "dd/MM/yyyy HH:mm" }}
      </div>
    </div>
  </form>
  <button class="btn btn-danger delete-account">Supprimer mon compte</button>
  <button class="btn btn-secondary btn-fullwidth" (click)="goToMainpage()">
    Retour à l'accueil
  </button>
  @if (showToast) {
    <div
      class="reset-toast"
      [ngClass]="{ success: toastSuccess, error: !toastSuccess }"
    >
      {{ toastMessage }}
    </div>
  }
  @if (showEditModal) {
    <app-editmodal
      [title]="'Modifier le pseudo'"
      [label]="'Nouveau pseudo'"
      [type]="'text'"
      [fieldId]="'editPseudo'"
      [value]="user.pseudo"
      [fieldName]="'pseudo'"
      (validate)="onEditField($event)"
      (cancel)="closeEditModal()"
    />
  }

  @if (showChangePasswordModal) {
    <app-passwordmodal
      [passwordError]="passwordError"
      [passwordLoading]="passwordLoading"
      [passwordRules]="passwordRules"
      (close)="closeChangePasswordModal()"
      (submit)="onChangePasswordSubmit($event)"
    />
  }
</div>
