<div class="login-container">
  <div class="header">
    <h1>A ta soif !</h1>
    <img
      class="header-logo"
      src="/logo/ChatGPT Image 9 juil. 2025, 20_41_54.png"
      alt="logo du site"
    />
  </div>
  <div class="login-card">
    <h2>Connexion</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-input-container">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password-btn"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="
              showPassword
                ? 'Masquer le mot de passe'
                : 'Afficher le mot de passe'
            "
          >
            <svg
              *ngIf="!showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg
              *ngIf="showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <path d="M9 4.45l9 9"></path>
              <path d="M17.5 7.5l-12 12"></path>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit">Se connecter</button>
      @if (error) {
        <div class="error">{{ error }}</div>
      }
      <div class="login-toast" *ngIf="showToast">
        {{ toastMessage }}
      </div>
    </form>
    <div class="forgot-link">
      <a routerLink="/forgot-password" class="forgot-btn">
        <span class="icon-lock"
          ><svg width="18" height="18" fill="none" viewBox="0 0 24 24">
            <path
              fill="#6c63ff"
              d="M17 9V7a5 5 0 0 0-10 0v2a3 3 0 0 0-3 3v6a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-6a3 3 0 0 0-3-3Zm-8-2a3 3 0 0 1 6 0v2H9V7Zm10 11a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-6a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6Z"
            /></svg
        ></span>
        <span>Mot de passe oublié&nbsp;?</span>
      </a>
    </div>
    <div class="register-link">
      <span>Pas encore de compte ? </span
      ><a class="register-underline" routerLink="/register">S'inscrire</a>
    </div>
  </div>
  <app-footer></app-footer>
</div>
