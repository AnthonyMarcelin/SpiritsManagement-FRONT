<div class="whisky-container">
  <h2>Liste des Whiskys</h2>

  <!-- Indicateur de chargement -->
  <div *ngIf="loading" class="loading">Chargement des whiskys...</div>

  <!-- Message d'erreur -->
  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <!-- Liste des whiskys -->
  <div *ngIf="!loading && !error" class="whisky-grid">
    <div *ngFor="let whisky of whiskies" class="whisky-card">
      <h3>{{ whisky.name }}</h3>
      <p>{{ whisky.description }}</p>
      <p><strong>Prix:</strong> {{ whisky.price }}€</p>
      <div *ngIf="whisky.photo" class="whisky-image">
        <img [src]="whisky.photo" [alt]="whisky.name" />
      </div>
    </div>
  </div>

  <!-- Message si aucun whisky -->
  <div *ngIf="!loading && !error && whiskies.length === 0" class="empty">
    Aucun whisky trouvé.
  </div>
</div>
